version: "3.9"

# Engram is one container: Postgres+pgvector (the brain's storage) plus the MCP
# server that exposes it. `docker compose up` is the whole setup. Point any
# MCP-capable agent at http://localhost:8080/sse to give it a memory.
services:
  engram:
    build: .
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Boots with a small demo brain so "try it" isn't empty. Set to "0" for a
      # clean brain in real deployments.
      ENGRAM_SEED_DEMO: "${ENGRAM_SEED_DEMO:-1}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "8080:8080"   # MCP endpoint — attach your agent at http://localhost:8080/sse

volumes:
  pgdata:
