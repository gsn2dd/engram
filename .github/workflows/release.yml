name: Publish container image

# Builds the single self-contained engram image (Postgres+pgvector + app + schema)
# and pushes it to GitHub Container Registry on every version tag, so users can
# `docker run ghcr.io/<owner>/engram` without cloning or building.
#
# To cut a release:  git tag v0.1.0 && git push origin v0.1.0
# After the first publish, set the GHCR package to Public (repo → Packages → settings).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # allow a manual run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # needed to push to GHCR with GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
